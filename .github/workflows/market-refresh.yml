name: Refresh Market Data

on:
  # Schedule disabled - workflow discontinued
  # workflow_dispatch kept for manual runs if ever needed
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Fetch market data
        run: python refresh_data.py > market_data.json 2> fetch.log

      - name: Show fetch log
        run: cat fetch.log

      - name: Validate JSON
        run: python -c "import json; json.load(open('market_data.json'))"

      - name: Update Gist
        uses: exuanbo/actions-deploy-gist@v1
        with:
          token: ${{ secrets.GIST_TOKEN }}
          gist_id: ${{ secrets.GIST_ID }}
          file_path: market_data.json
          file_type: text
